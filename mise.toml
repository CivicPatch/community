[tools]
python = "3.13"
uv = "0.11.21"
gitleaks = "8.30.1"
pre-commit = "4.6.0"

[tasks.setup]
run = """
pre-commit install
"""

[tasks.feeds]
dir = "{{ config_root }}"
run = """
uv run python projects/feeds/src/main.py
"""

[tasks.home-dev]
dir = "{{ config_root }}/projects/home"
env = { FEED_OUTPUT_FOLDER = "{{ config_root }}/projects/home/public" }
run = """
    mise feeds &&
    npm run dev
"""

[tasks.home]
dir = "{{ config_root }}/projects/home"
env = { FEED_OUTPUT_FOLDER = "{{ config_root }}/projects/home/public" }
run = """
    mise feeds &&
    npm run build
"""