[tools]
python = "3.13"
uv = "0.11.21"
gitleaks = "8.30.1"
pre-commit = "4.6.0"
terraform = "1.15.6"

[env]
# Load secrets from .env (gitignored). Terraform reads TF_VAR_* names directly.
_.file = ".env"

[tasks.setup]
run = """
pre-commit install
"""

[tasks.feeds]
dir = "{{ config_root }}"
run = """
uv run --package feeds python projects/feeds/src/main.py
"""

[tasks.home-dev]
dir = "{{ config_root }}/projects/home"
env = { FEED_OUTPUT_FOLDER = "{{ config_root }}/projects/home/public" }
run = """
    mise feeds &&
    npm install &&
    npm run dev
"""

[tasks.build]
dir = "{{ config_root }}/projects/home"
env = { FEED_OUTPUT_FOLDER = "{{ config_root }}/projects/home/public" }
run = """
    npm ci &&
    mise feeds &&
    npm run build
"""