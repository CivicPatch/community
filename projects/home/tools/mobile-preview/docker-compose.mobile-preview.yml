# ⚠️  DEBUG HARNESS — NOT THE APP STACK.  ⚠️
#
# This compose file exists ONLY to reproduce the "blank grid on mobile" bug.
# It builds the hangout site, serves the static bundle, and drives a headless
# Chrome at a phone-sized viewport to screenshot the grid and dump console
# errors + sizing diagnostics.
#
# It does NOT run the real project: no Supabase, no realtime audio/WebRTC, no
# production config. The real site is a static Vite app — run it with
# `npm run dev` from projects/home, or it deploys to GitHub Pages. Do not treat
# this file as "the way to start the app."
#
# Run it (from projects/home/tools/mobile-preview/):
#   docker compose -f docker-compose.mobile-preview.yml up --build --abort-on-container-exit
#
# Output: ./out/01-initial.png, ./out/02-after-join.png, ./out/03-chat-grid.png
# plus the `shot` container logs (grid sizing diagnostics + a blank/not-blank
# verdict). Tear down with:
#   docker compose -f docker-compose.mobile-preview.yml down -v
#
# The `name:` below namespaces every container as home-mobile-preview-* so this
# can never be confused with — or collide with — a real project stack.
name: home-mobile-preview

services:
  # Builds the hangout site and serves the static bundle. Throwaway preview only.
  site:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ../..:/app:ro # projects/home source, read-only
      - home_mobile_preview_modules:/app/node_modules # container deps, off the host
      - home_mobile_preview_dist:/app/dist # build output, off the host
    command: >
      sh -c "npm ci && npx vite build &&
             npx vite preview --host 0.0.0.0 --port 4173 --strictPort"
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:4173/hangout/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 60
      start_period: 15s
    networks: [home_mobile_preview_net]

  # Headless Chrome (Puppeteer) — loads the page at a mobile viewport, screenshots
  # it, and reports why the grid renders blank. Builds, runs once, exits.
  shot:
    build:
      context: .
      dockerfile: Dockerfile
    user: root # so screenshots are writable to the ./out bind mount; chrome runs --no-sandbox
    working_dir: /shot
    depends_on:
      site:
        condition: service_healthy
    # Share the site container's network stack so the browser reaches the preview
    # server as http://localhost:4173 — Vite's preview server only accepts a
    # `Host: localhost` header (DNS-rebinding protection 403s a container hostname).
    network_mode: "service:site"
    environment:
      TARGET_URL: http://localhost:4173/hangout/
      OUT_DIR: /shot/out
      # Set BLOCK_STORAGE=1 in your shell to make web storage throw (Firefox Focus sim):
      #   BLOCK_STORAGE=1 docker compose -f docker-compose.mobile-preview.yml up --build
      BLOCK_STORAGE: ${BLOCK_STORAGE:-}
    volumes:
      - ./out:/shot/out
    command: node /shot/screenshot.mjs

networks:
  home_mobile_preview_net:
    driver: bridge

volumes:
  home_mobile_preview_modules:
  home_mobile_preview_dist:
