<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hangout</title>
    <!-- the site stylesheet provides the theme tokens (--ink/--bg/--accent…) and
         color-scheme: light dark; the component reads those through the shadow DOM -->
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      .note {
        max-width: 40rem;
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <!-- .content is the site's column wrapper; it stretches children to a sane
         width. Without it, body's `align-items: center` collapses the grid. -->
    <main class="content">
      <nav class="topnav"><a href="/">home</a><a href="/hangout/" aria-current="page">hangout</a></nav>
      <h1>hangout</h1>
      <ul class="note">
        <li>None of the Google meetings are real! TODO: fill them out with legit links</li>
        <li>WASD to move around</li>
        <li>click to navigate</li>
      </ul>
      <chat-grid config-url="/grid.json"></chat-grid>
    </main>
    <script type="module" src="/src/components/chat-grid/chat-grid.ts"></script>
  </body>
</html>
