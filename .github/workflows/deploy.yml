# .github/workflows/deploy.yml
name: Deploy to Pages
on:
  push:
    branches: [main]
  # hourly at :39 (minutes past the hour), to refresh the feeds (fetched at build time)
  schedule:
    - cron: "39 * * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4          
      - run: mise run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: projects/home/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
